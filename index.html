<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ae! Cozinha | Parede Viva</title>
  <meta name="description" content="Exposição Parede Viva no restaurante ae! Cozinha. Arte e alta gastronomia em harmonia." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <div class="header-content">
        <a class="brand" href="index.html" aria-label="Página inicial">
          <img src="assets/img/ae-begesuave-v.png" alt="ae! Cozinha Logo" />
        </a>
        <div class="header-center">
          <h1 class="brand-title">Parede Viva</h1>
          <p class="brand-subtitle">Ciclo de Exposições 2025</p>
        </div>
        <div class="header-right">
          <div class="search-box">
             <input id="q" class="input-search" type="search" placeholder="Buscar artista..." aria-label="Buscar" />
          </div>
          <button class="menu-btn" id="openMenu" aria-label="Abrir menu">
            <span class="menu-icon"></span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav class="menu-panel">
    <button id="closeMenu" class="close-btn">&times;</button>
    <ul class="menu-list">
      <li><a href="#" data-section="sobre-projeto">O Projeto Parede Viva</a></li>
      <li><a href="#" data-section="sobre-ae">O ae! Cozinha</a></li>
      <li class="menu-divider">Nossos Artistas</li>
      <li><a href="#" data-section="artista-pipilu">Atelier Pipilu</a></li>
      <li><a href="#" data-section="artista-silvia">Silvia Gerson</a></li>
      <li><a href="#" data-section="artista-milla">Milla Orlandi</a></li>
      <li><a href="#" data-section="artista-paula">Paula Iwata</a></li>
    </ul>
  </nav>
  <div class="menu-overlay"></div>

  <main class="main-content">
    <div class="wrap">
      <div class="grid" id="gallery" aria-live="polite"></div>
      <section id="info" class="info-section hidden" aria-live="polite">
        <div class="info-container">
          <div id="infoBody" class="section-content"></div>
          <button id="backToGallery" class="back-btn">← Voltar para a Galeria</button>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© 2025 ae! Cozinha — Arte, Técnica e Afeto.</p>
    </div>
  </footer>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <img id="lightboxImg" alt="" />
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
